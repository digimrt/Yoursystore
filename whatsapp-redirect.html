<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التوجيه إلى واتساب...</title>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #25D366;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #25D366;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="message">
        <div class="spinner"></div>
        <h2>جاري تحويلك إلى واتساب...</h2>
        <p>إذا لم يتم التحويل تلقائياً خلال ثوان، <a href="#" id="fallbackLink">اضغط هنا</a>.</p>
    </div>

    <script>
        (function() {
            // استخراج المعاملات من URL
            const urlParams = new URLSearchParams(window.location.search);
            const phone = urlParams.get('phone') || '22230764882';
            const text = urlParams.get('text') || '';
            
            // روابط
            const deepLink = `whatsapp://send?phone=${phone}&text=${encodeURIComponent(text)}`;
            const webLink = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
            
            // تعيين رابط الرابط الاحتياطي في الرابط النصي
            document.getElementById('fallbackLink').href = webLink;
            
            // محاولة فتح التطبيق عبر deep link
            window.location.href = deepLink;
            
            // إذا لم يفتح التطبيق خلال 2 ثانية، نوجه إلى رابط الويب
            setTimeout(function() {
                // التحقق مما إذا كانت الصفحة لا تزال مرئية (أي لم يتم تصغيرها)
                if (!document.hidden) {
                    window.location.href = webLink;
                }
            }, 2000);
            
            // مراقبة إخفاء الصفحة (يعني تم فتح التطبيق)
            window.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    // تم فتح التطبيق، نلغي المهلة
                    setTimeout(function() {
                        window.close(); // محاولة إغلاق الصفحة (قد لا تعمل دائماً)
                    }, 500);
                }
            });
        })();
    </script>
</body>
</html>
